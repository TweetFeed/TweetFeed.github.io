        - "https://attack.mitre.org/groups/G0094/"
        - "https://www.cisa.gov/news-events/cybersecurity-advisories/aa20-301a"
    bullets:
      - label: "Threat actor"
        html: "DPRK-aligned APT active since at least 2012, also tracked as <em>Velvet Chollima</em> (CrowdStrike), <em>TA427</em> (Proofpoint) and <em>Black Banshee</em> (Mandiant)."
      - label: "Targets"
        html: "South Korean government, defense and academic organisations; expanded to think tanks and research institutions in the US, Japan and Europe."
      - label: "Tactics"
        html: "spear-phishing with weaponised HWP and PDF, custom backdoors (BabyShark, AppleSeed, GoldDragon), credential harvesting on legacy email portals, fake login pages."
      - label: "References"
        html: '<a href="https://attack.mitre.org/groups/G0094/" target="_blank" rel="noopener noreferrer">MITRE ATT&amp;CK G0094</a> &middot; <a href="https://www.cisa.gov/news-events/cybersecurity-advisories/aa20-301a" target="_blank" rel="noopener noreferrer">CISA AA20-301A</a>.'
    faq_q1:
      q: "What is Kimsuky?"
      a: "Kimsuky is a DPRK-aligned advanced persistent threat (APT) group active since at least 2012. It is also tracked under the names Velvet Chollima (CrowdStrike), TA427 (Proofpoint) and Black Banshee (Mandiant). Kimsuky targets South Korean government, defense and academic organisations, and has expanded to research institutions in the United States, Japan and Europe. The group is known for spear-phishing, weaponised HWP and PDF documents, and custom backdoors such as BabyShark, AppleSeed and GoldDragon."
    faq_q2:
      q: "Is Kimsuky the same as Lazarus?"
      a: "No. Both Kimsuky and Lazarus are DPRK-aligned, but they are distinct clusters tracked by different attribution analysts and target different verticals. Lazarus focuses on financial gain (cryptocurrency exchanges, banks). Kimsuky focuses on intelligence collection (foreign policy, defense, academic). The #Lazarus tag on TweetFeed groups its own IOCs separately."
    related_tags:
      - {display: "DPRK", slug: "dprk"}
      - {display: "APT", slug: "apt"}
      - {display: "C2", slug: "c2"}
      - {display: "malware", slug: "malware"}
      - {display: "Lazarus", slug: "lazarus"}

