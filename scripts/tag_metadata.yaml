    bullets:
      - label: "Definition"
        html: "fraud infrastructure that does not necessarily steal credentials. Common types: fake e-commerce stores, fraudulent crypto-investment platforms, romance scams, fake giveaways, fake support hotlines, fake tech-support pop-ups."
      - label: "Common variants"
        html: "fake Trezor / Ledger reset pages, fake X/Twitter promotion bots, fake DEX phishing dApps, AI-generated celebrity-deepfake giveaways, fake government/tax-refund sites."
      - label: "Detection"
        html: "domain age + WHOIS lexical analysis, certificate transparency for impersonation, image-similarity matching against legitimate brand assets, and reverse-image search on profile pictures."
      - label: "References"
        html: '<a href="https://attack.mitre.org/techniques/T1656/" target="_blank" rel="noopener noreferrer">MITRE ATT&amp;CK T1656 (Impersonation)</a> &middot; <a href="https://www.ftc.gov/business-guidance/privacy-security/scams" target="_blank" rel="noopener noreferrer">FTC scam advisories</a>.'
    faq_q1:
      q: "What counts as a scam vs phishing?"
      a: "Phishing typically aims to steal credentials or session tokens to take over an account. Scam covers a broader category of fraud where the attacker convinces the victim to part with money, crypto or sensitive data without necessarily compromising an account. The lines blur (many phishing kits are also scam infrastructure), so adjacent tags often co-occur on the same IOC."
    faq_q2:
      q: "What kinds of scams are most common in the feed?"
      a: "Crypto-investment platforms, fake e-commerce stores, romance scams targeting Western dating-app users, fake X/Twitter giveaway bots, fake tax-refund sites, AI-generated deepfake celebrity-promo pages, and impersonation of legitimate exchanges (Binance, Coinbase) requesting wallet seeds."
    related_tags:
