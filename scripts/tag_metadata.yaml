      name: "Phishing"
      alternate_names: ["Spearphishing", "Credential phishing"]
      same_as:
        - "https://attack.mitre.org/techniques/T1566/"
        - "https://www.cisa.gov/topics/cyber-threats-and-advisories/phishing"
    bullets:
      - label: "Definition"
        html: "social-engineering attack that impersonates a trusted brand, service or individual to steal credentials, deploy malware or commit fraud. Classified by MITRE ATT&amp;CK as T1566 with sub-techniques for spearphishing attachment, link and via-service."
      - label: "Common variants"
        html: "credential phishing (fake login pages), Business Email Compromise (BEC), smishing (SMS), vishing (voice), QR phishing (quishing), adversary-in-the-middle kits like Evilginx and Tycoon-2FA that bypass legacy MFA."
      - label: "Detection"
        html: "email header authentication (SPF, DKIM, DMARC), URL reputation, certificate transparency monitoring, content inspection for logo cloning and form-action mismatches, and user-reported phish boxes. Phishing-resistant MFA (FIDO2/WebAuthn) is the most effective preventative control."
      - label: "References"
        html: '<a href="https://attack.mitre.org/techniques/T1566/" target="_blank" rel="noopener noreferrer">MITRE ATT&amp;CK T1566</a> &middot; <a href="https://www.cisa.gov/topics/cyber-threats-and-advisories/phishing" target="_blank" rel="noopener noreferrer">CISA Phishing</a> &middot; <a href="https://phishunt.io/" target="_blank" rel="noopener noreferrer">phishunt.io</a> (sister project, real-time phishing detection).'
    faq_q1:
      q: "What is phishing?"
      a: "Phishing is a social-engineering attack in which an adversary impersonates a trusted brand, service or individual to trick the target into revealing credentials, deploying malware or transferring funds. The MITRE ATT&CK framework classifies it under T1566 (Phishing) with sub-techniques for spearphishing attachment (T1566.001), spearphishing link (T1566.002) and spearphishing via service (T1566.003). Common delivery vectors are email, SMS (smishing), instant message and voice (vishing)."
    faq_q2:
      q: "What kind of IOCs are tagged #phishing on TweetFeed?"
      a: "URLs, domains and IPs hosting phishing kits or fake login pages, observed by public Twitter/X researchers. Hashes are rare for phishing because the payload is usually a hosted webpage, not a binary. Adjacent tags include #scam (financial scam infrastructure), #opendir (open directories that host phishing kits) and brand-specific tags when researchers attribute the kit to a known impersonation campaign."
    related_tags:
      - {display: "scam", slug: "scam"}
      - {display: "opendir", slug: "opendir"}
      - {display: "malware", slug: "malware"}

  - slug: c2
    display_tag: c2
    license_subject: "C2"
    category: ttp
    short_subtitle: "Command and Control infrastructure (URLs, IPs, domains) hosting attacker servers and beacons"
    short_subtitle_mobile: "Command and Control servers (URLs, IPs, domains)"
    seo_title: "C2 (Command and Control) IOC Feed - URLs, IPs, Domains - TweetFeed"
    twitter_title: "C2 IOC feed - TweetFeed"
    twitter_description: "Real-time IOCs tagged C2 (Command and Control servers, listeners, redirectors) extracted from public Twitter/X researchers. CC0, no auth."
    og_image_alt: "TweetFeed - C2 IOC feed"
    webpage_name: "C2 (Command and Control) IOC feed"
    webpage_description: "Real-time IOCs (URLs, IPs, domains) tagged C2 - Command and Control infrastructure (servers, listeners, redirectors) observed by public security researchers."
    meta_description: "IOCs tagged C2 (command and control): servers, listeners and redirectors from public Twitter/X researchers. {year} hits last year. Updated every 15 min."
    meta_keywords: "c2,command and control,c2 server,c2 ioc,beacon,listener,redirector,ioc feed,osint,Threat Intelligence"
    schema_about:
      type: Thing
      name: "Command and Control"
      alternate_names: ["C2", "C&C", "CnC"]
      same_as:
        - "https://attack.mitre.org/tactics/TA0011/"
    bullets:
      - label: "Definition"
        html: "infrastructure that an adversary uses to maintain a covert channel with compromised hosts. MITRE ATT&amp;CK tracks it as Tactic <code>TA0011 (Command and Control)</code>, with techniques covering application-layer protocols, encrypted channels, fast flux DNS, domain fronting and many others."
      - label: "Common variants"
        html: "Cobalt Strike Beacon, Sliver, Mythic, Havoc, Empire, plus bespoke implants. Infrastructure ranges from single-VPS HTTP listeners to complex chains with redirectors, fronting domains and CDN-hidden ingress."
      - label: "Detection"
        html: "DNS reputation, JA3/JA4 TLS fingerprinting, beacon-jitter analysis, sinkhole + traffic-analytics, certificate transparency for short-lived certs, and YARA on memory-resident agents."
      - label: "References"
        html: '<a href="https://attack.mitre.org/tactics/TA0011/" target="_blank" rel="noopener noreferrer">MITRE ATT&amp;CK TA0011</a> &middot; see also tag-specific pages for <a href="../cobaltstrike/" class="text-decoration-none">#cobaltstrike</a>, <a href="../sliver/" class="text-decoration-none">#sliver</a>, <a href="../mythic/" class="text-decoration-none">#mythic</a>, <a href="../havoc/" class="text-decoration-none">#havoc</a>.'
    faq_q1:
      q: "What is C2 (Command and Control)?"
      a: "Command and Control is the channel adversaries use to communicate with compromised hosts during an intrusion. The MITRE ATT&CK framework groups all related techniques under tactic TA0011. C2 infrastructure can be a single VPS hosting an HTTP listener, or a long chain involving redirectors, fronting domains and CDN-hidden ingress to evade detection."
    faq_q2:
      q: "Which C2 frameworks generate the most IOCs on TweetFeed?"
      a: "Cobalt Strike, Sliver, Mythic, Havoc and bespoke implants dominate the corpus. Each has its own dedicated tag on TweetFeed for finer filtering: see #cobaltstrike, #sliver, #mythic, #havoc. The #c2 umbrella tag is broader and includes everything researchers flag as C2 infrastructure regardless of framework."
    related_tags:
      - {display: "CobaltStrike", slug: "cobaltstrike"}
      - {display: "Sliver", slug: "sliver"}
      - {display: "Mythic", slug: "mythic"}
      - {display: "Havoc", slug: "havoc"}
      - {display: "malware", slug: "malware"}

