      q: "What is ransomware?"
      a: "Ransomware is malware that encrypts a victim's data and demands payment - usually in cryptocurrency - for the decryption key. Modern operators add data-theft and public leaks (\"double extortion\") even if the victim restores from backups. Initial access is typically via phishing, exposed RDP, vulnerable VPN appliances or compromised credentials."
    faq_q2:
      q: "Which ransomware operators produce the most IOCs in this feed?"
