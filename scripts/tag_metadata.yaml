    faq_q2:
      q: "How do credentials from stealers end up being used?"
      a: "Operators bundle stolen credentials into \"logs\" sold on marketplaces. Buyers - often initial-access brokers or ransomware affiliates - replay the credentials against the victim's enterprise services (corporate email, VPNs, cloud consoles, single-sign-on). Successful re-use frequently leads to more serious downstream intrusions."
