# tag_metadata.yaml -- per-tag metadata for scripts/regen_tag_pages.py.
#
# Slug = URL segment, lowercase. display_tag = what appears in the hero
# h1 ("#display_tag"). license_subject = proper-case noun used in prose.
# Each related_tag entry has its own display + slug.
#
# Categories:
#   apt-group       -- threat actor cluster
#   malware-family  -- offensive tooling / RAT / loader / stealer / C2 framework
#   ttp             -- generic technique / category / infra label
#
# faq_q1, faq_q2: tag-specific. faq_q3 (updates) and faq_q4 (license) are
# templated by regen_tag_pages.py from license_subject.

tags:

