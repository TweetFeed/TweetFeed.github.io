    meta_keywords: "cobaltstrike,cobalt strike,beacon,red team,c2 framework,s0154,ioc feed,osint,Threat Intelligence"
    schema_about:
      type: SoftwareApplication
      name: "Cobalt Strike"
      alternate_names: ["Beacon", "CS"]
      application_category: "SecurityApplication"
      same_as:
        - "https://attack.mitre.org/software/S0154/"
        - "https://malpedia.caad.fkie.fraunhofer.de/details/win.cobalt_strike"
    bullets:
      - label: "Type"
        html: "commercial adversary simulation framework. Team Server + Beacon implant architecture, supports HTTP, HTTPS, DNS and named-pipe C2. Vendor: Fortra (formerly Strategic Cyber LLC)."
      - label: "Abuse pattern"
        html: "pirated and cracked copies dominate the wild. Routinely deployed by APTs (e.g., APT41, FIN7), ransomware affiliates (Conti, BlackCat, Akira) and initial access brokers as the second stage after phishing or exploit landing pages."
      - label: "Detection signals"
        html: "default Beacon profiles leak through HTTP URI patterns, named pipes, sleep jitter and process injection. Defenders watch for stager URIs, JA3/JA4 fingerprints and hardcoded watermarks; YARA covers known stomped DLL patterns."
      - label: "References"
        html: '<a href="https://attack.mitre.org/software/S0154/" target="_blank" rel="noopener noreferrer">MITRE ATT&amp;CK S0154</a> &middot; <a href="https://malpedia.caad.fkie.fraunhofer.de/details/win.cobalt_strike" target="_blank" rel="noopener noreferrer">Malpedia</a> &middot; <a href="https://www.cobaltstrike.com/" target="_blank" rel="noopener noreferrer">Vendor (Fortra)</a>.'
    faq_q1:
      q: "What is Cobalt Strike?"
      a: "Cobalt Strike is a commercial adversary simulation and red-team framework developed by Fortra (formerly Strategic Cyber LLC). It pairs a Team Server with a Beacon implant that runs on a target machine, supporting HTTP, HTTPS, DNS and named-pipe C2. It is licensed for legitimate red-team engagements, but pirated and cracked copies dominate the wild and are routinely deployed by APTs, ransomware affiliates and initial access brokers as the second stage after phishing or exploit landing pages."
    faq_q2:
      q: "Is Cobalt Strike legal?"
      a: "Possessing and operating an officially licensed Cobalt Strike copy for authorised red-team work is legal. Distributing, possessing or running cracked Cobalt Strike copies is not. The IOCs on this page are extracted from public threat-research tweets and tag servers that researchers have observed in real-world intrusions; vendor licensing status is not asserted for any specific IP, domain or hash."
    related_tags:
      - {display: "C2", slug: "c2"}
      - {display: "malware", slug: "malware"}
      - {display: "APT", slug: "apt"}
      - {display: "ransomware", slug: "ransomware"}

